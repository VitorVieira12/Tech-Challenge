AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Tech Challenge - Lambda para autenticação por CPF

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: java21
    Architectures:
      - x86_64
    Environment:
      Variables:
        JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1

Parameters:
  DBHost:
    Type: String
    Description: RDS PostgreSQL endpoint
    Default: tech-challenge-db.xxxxx.us-east-1.rds.amazonaws.com
  
  DBPort:
    Type: String
    Description: Database port
    Default: "5432"
  
  DBName:
    Type: String
    Description: Database name
    Default: tech_challenge
  
  DBUsername:
    Type: String
    Description: Database username
    NoEcho: true
  
  DBPassword:
    Type: String
    Description: Database password
    NoEcho: true
  
  JWTSecret:
    Type: String
    Description: JWT secret key (256 bits)
    NoEcho: true

Resources:
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tech-challenge-auth-cpf
      Handler: com.lambda.AuthHandler::handleRequest
      CodeUri: .
      Description: Autentica cliente por CPF e gera JWT
      Environment:
        Variables:
          DB_HOST: !Ref DBHost
          DB_PORT: !Ref DBPort
          DB_NAME: !Ref DBName
          DB_USERNAME: !Ref DBUsername
          DB_PASSWORD: !Ref DBPassword
          JWT_SECRET: !Ref JWTSecret
          JWT_EXPIRATION: "86400000"
      Events:
        AuthApi:
          Type: Api
          Properties:
            Path: /auth
            Method: post
            RestApiId: !Ref AuthApi
      Policies:
        - VPCAccessPolicy: {}
      # VpcConfig:
      #   SecurityGroupIds:
      #     - !Ref LambdaSecurityGroup
      #   SubnetIds:
      #     - !Ref PrivateSubnet1
      #     - !Ref PrivateSubnet2

  AuthApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: tech-challenge-auth-api
      StageName: Prod
      Cors:
        AllowMethods: "'POST, OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: Tech Challenge Auth API
          version: 1.0.0
        paths:
          /auth:
            post:
              summary: Autenticar cliente por CPF
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        cpf:
                          type: string
                          example: "12345678901"
              responses:
                '200':
                  description: Autenticação bem-sucedida
                  content:
                    application/json:
                      schema:
                        type: object
                        properties:
                          token:
                            type: string
                          type:
                            type: string
                          expiresIn:
                            type: number
                          clienteId:
                            type: number
                          clienteNome:
                            type: string
                '400':
                  description: CPF inválido
                '401':
                  description: Cliente não encontrado ou inativo
                '500':
                  description: Erro interno
              x-amazon-apigateway-integration:
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthFunction.Arn}/invocations
                httpMethod: POST
                type: aws_proxy

  AuthFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AuthFunction}
      RetentionInDays: 7

Outputs:
  AuthApiUrl:
    Description: "URL do API Gateway para autenticação"
    Value: !Sub "https://${AuthApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/auth"
    Export:
      Name: !Sub "${AWS::StackName}-AuthApiUrl"

  AuthFunctionArn:
    Description: "ARN da função Lambda"
    Value: !GetAtt AuthFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AuthFunctionArn"

  AuthFunctionName:
    Description: "Nome da função Lambda"
    Value: !Ref AuthFunction
    Export:
      Name: !Sub "${AWS::StackName}-AuthFunctionName"

