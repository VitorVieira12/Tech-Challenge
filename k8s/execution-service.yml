apiVersion: v1
kind: Namespace
metadata:
  name: execution-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: execution-service-config
  namespace: execution-service
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8082"
  RABBITMQ_PORT: "5672"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  namespace: execution-service
  labels:
    app: execution-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: execution-service
  template:
    metadata:
      labels:
        app: execution-service
    spec:
      containers:
        - name: execution-service
          image: vitorvieira12/execution-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: JAVA_OPTS
              value: "-Xmx220m -Xms128m -XX:+UseContainerSupport"
            - name: NEW_RELIC_AGENT_ENABLED
              value: "false"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: execution-service-secrets
                  key: mongodb-uri
            - name: MONGODB_DATABASE
              value: "execution_service"
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: execution-service-secrets
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: execution-service-config
                  key: RABBITMQ_PORT
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: execution-service-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "450Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  namespace: execution-service
spec:
  selector:
    app: execution-service
  ports:
    - port: 80
      targetPort: 8082
  type: LoadBalancer
