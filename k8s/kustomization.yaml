# Kustomize configuration for easier deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tech-challenge

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - app-deployment.yaml
  - app-service.yaml
  - hpa.yaml
  - ingress.yaml

# Labels comuns para todos os recursos
commonLabels:
  project: tech-challenge
  managed-by: kustomize

# Annotations comuns
commonAnnotations:
  version: "1.0.0"
  maintainer: "tech-challenge-team"

# Imagens (facilita atualização de versão)
images:
  - name: tech-challenge
    newName: tech-challenge
    newTag: latest

# Para diferentes ambientes, crie overlays:
# k8s/
#   base/
#     kustomization.yaml
#     ...
#   overlays/
#     dev/
#       kustomization.yaml
#     prod/
#       kustomization.yaml

