apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tech-challenge-ingress
  namespace: tech-challenge
  labels:
    app: tech-challenge
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # Rate Limiting (opcional)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    
    # CORS (opcional)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  rules:
  - host: tech-challenge.local  # Altere para seu domínio
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tech-challenge-service
            port:
              number: 80
  
  # Configuração TLS (descomente e configure se tiver certificado)
  # tls:
  # - hosts:
  #   - tech-challenge.local
  #   secretName: tech-challenge-tls

