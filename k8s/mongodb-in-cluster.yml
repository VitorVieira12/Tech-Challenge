apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: execution-service
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: execution-service
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "execution_user"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "eQj8b8YNGTOvvsdF"
            - name: MONGO_INITDB_DATABASE
              value: "execution_service"
          args:
            - --wiredTigerCacheSizeGB
            - "0.25"
          resources:
            requests:
              memory: "180Mi"
              cpu: "100m"
            limits:
              memory: "320Mi"
              cpu: "400m"
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: data
          emptyDir: {}
