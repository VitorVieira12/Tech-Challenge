apiVersion: v1
kind: Namespace
metadata:
  name: os-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: os-service-config
  namespace: os-service
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  RABBITMQ_PORT: "5672"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-service
  namespace: os-service
  labels:
    app: os-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: os-service
  template:
    metadata:
      labels:
        app: os-service
    spec:
      containers:
        - name: os-service
          image: vitorvieira12/os-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-Xmx220m -Xms128m -XX:+UseContainerSupport"
            - name: NEW_RELIC_AGENT_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: os-service-secrets
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: os-service-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: os-service-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: os-service-secrets
                  key: jwt-secret
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: os-service-secrets
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: os-service-config
                  key: RABBITMQ_PORT
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: os-service-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "450Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: os-service
  namespace: os-service
spec:
  selector:
    app: os-service
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
