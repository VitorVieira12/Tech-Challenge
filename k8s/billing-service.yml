apiVersion: v1
kind: Namespace
metadata:
  name: billing-service
---
apiVersion: v1
kind: Secret
metadata:
  name: billing-service-secrets
  namespace: billing-service
type: Opaque
stringData:
  db-url: "jdbc:postgresql://tech-challenge-db.cgxmk6mmaeyg.us-east-1.rds.amazonaws.com:5432/billing_service"
  db-username: "postgres"
  db-password: "<DB_PASSWORD>"
  rabbitmq-host: "rabbitmq.rabbitmq.svc.cluster.local"
  mercadopago-token: "<MERCADOPAGO_ACCESS_TOKEN>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-service-config
  namespace: billing-service
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8081"
  RABBITMQ_PORT: "5672"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: billing-service
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: vitorvieira12/billing-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: billing-service-secrets
                  key: db-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: billing-service-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-service-secrets
                  key: db-password
            - name: RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: billing-service-secrets
                  key: rabbitmq-host
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: billing-service-config
                  key: RABBITMQ_PORT
            - name: MERCADOPAGO_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: billing-service-secrets
                  key: mercadopago-token
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: billing-service-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: billing-service
spec:
  selector:
    app: billing-service
  ports:
    - port: 80
      targetPort: 8081
  type: LoadBalancer
