name: CI/CD Pipeline - Tech Challenge

on:
  push:
    branches:
      - main
      - develop
      - tech-2
  pull_request:
    branches:
      - main
      - develop
      - tech-2

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: tech-challenge-production-eks
  ECR_REPOSITORY: tech-challenge
  DOCKER_IMAGE_TAG: ${{ github.sha }}
  JAVA_VERSION: 21

jobs:
  # ============================================================================
  # JOB 1: BUILD E TESTES
  # ============================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      
      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: 🔧 Build with Maven
        run: |
          mvn clean install -DskipTests
          echo "✅ Build concluído com sucesso"
      
      - name: 🧪 Run Unit Tests
        run: |
          mvn test
          echo "✅ Testes unitários concluídos"
      
      - name: 🧪 Run Integration Tests
        run: |
          mvn verify -DskipUnitTests
          echo "✅ Testes de integração concluídos"
      
      - name: 📊 Generate Test Coverage Report
        run: |
          mvn jacoco:report
          echo "✅ Relatório de cobertura gerado"
      
      - name: 📈 Upload Coverage to Codecov (opcional)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
        continue-on-error: true
      
      - name: 📤 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 5

  # ============================================================================
  # JOB 2: ANÁLISE DE CÓDIGO (SONARQUBE - OPCIONAL)
  # ============================================================================
  code-analysis:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones devem ser desabilitados para análise
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      
      - name: 🔍 SonarCloud Scan (se configurado)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            mvn sonar:sonar \
              -Dsonar.projectKey=tech-challenge \
              -Dsonar.organization=your-org \
              -Dsonar.host.url=https://sonarcloud.io
            echo "✅ Análise SonarCloud concluída"
          else
            echo "⚠️ SONAR_TOKEN não configurado. Pulando análise."
          fi
        continue-on-error: true

  # ============================================================================
  # JOB 3: BUILD DA IMAGEM DOCKER E PUSH PARA ECR
  # ============================================================================
  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/tech-2')
    
    outputs:
      image-tag: ${{ steps.image-info.outputs.image-tag }}
      image-uri: ${{ steps.image-info.outputs.image-uri }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 📦 Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target
      
      - name: 🐳 Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "🏗️ Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:production
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:staging
          fi
          
          echo "✅ Docker image construída com sucesso"
      
      - name: 🔍 Scan Docker image for vulnerabilities
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "🔍 Scanning image for vulnerabilities..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG || true
          echo "✅ Security scan concluído"
      
      - name: 📤 Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "📤 Pushing images to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:production
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging
          fi
          
          echo "✅ Images pushed com sucesso"
      
      - name: 📋 Set image info as output
        id: image-info
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "image-tag=$DOCKER_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$DOCKER_IMAGE_TAG" >> $GITHUB_OUTPUT

  # ============================================================================
  # JOB 4: PROVISIONAR INFRAESTRUTURA COM TERRAFORM (SE NECESSÁRIO)
  # ============================================================================
  terraform-deploy:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: docker-build-push
    # Desabilitado: infraestrutura já provisionada manualmente
    if: false
    
    defaults:
      run:
        working-directory: infra/aws
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      
      - name: 🔧 Terraform Init
        run: |
          terraform init
          echo "✅ Terraform inicializado"
      
      - name: 📋 Terraform Plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan -out=tfplan
          echo "✅ Terraform plan gerado"
      
      - name: 🚀 Terraform Apply
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tech-2')
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform apply -auto-approve tfplan
          echo "✅ Infraestrutura provisionada"
      
      - name: 📤 Save Terraform outputs
        run: |
          terraform output -json > terraform-outputs.json
          echo "✅ Outputs salvos"
      
      - name: 📦 Upload Terraform outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: infra/aws/terraform-outputs.json

  # ============================================================================
  # JOB 5: DEPLOY NO KUBERNETES (EKS)
  # ============================================================================
  kubernetes-deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    # Removido dependency do terraform-deploy pois infraestrutura já existe
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/tech-2')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔧 Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'
      
      - name: 🔑 Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
          echo "✅ kubectl configurado para EKS"
      
      - name: 🔍 Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes
          echo "✅ Conexão com cluster verificada"
      
      - name: 🗂️ Create namespace if not exists
        run: |
          kubectl get namespace tech-challenge || kubectl create namespace tech-challenge
          echo "✅ Namespace verificado/criado"
      
      - name: 🗺️ Create/Update ConfigMap with RDS endpoint
        run: |
          # Deletar configmap se existir
          kubectl delete configmap app-config -n tech-challenge --ignore-not-found=true
          
          # Criar novo configmap com RDS endpoint
          kubectl create configmap app-config \
            --from-literal=DB_HOST=tech-challenge-db.c0fu4m0iqxxt.us-east-1.rds.amazonaws.com \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=tech_challenge_db \
            --from-literal=SPRING_PROFILES_ACTIVE=prod \
            --from-literal=SERVER_PORT=8080 \
            --from-literal=JWT_EXPIRATION=86400000 \
            --from-literal=LOGGING_LEVEL_ROOT=INFO \
            --from-literal=LOGGING_LEVEL_COM_TECHCHALLENGE=DEBUG \
            --from-literal=TZ=America/Sao_Paulo \
            -n tech-challenge
          
          echo "✅ ConfigMap criado/atualizado com RDS endpoint"
      
      - name: 🔐 Create/Update Secrets
        run: |
          # Deletar secret se existir
          kubectl delete secret app-secrets -n tech-challenge --ignore-not-found=true
          
          # Criar novo secret com valores do GitHub Secrets
          # DB_HOST aponta para o RDS provisionado pelo Terraform
          kubectl create secret generic app-secrets \
            --from-literal=DB_HOST=tech-challenge-db.c0fu4m0iqxxt.us-east-1.rds.amazonaws.com \
            --from-literal=DB_USERNAME=${{ secrets.DB_USERNAME }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }} \
            --from-literal=ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
            -n tech-challenge
          
          echo "✅ Secrets criados/atualizados com RDS endpoint"
      
      - name: 📝 Update deployment with new image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
        run: |
          # Criar uma cópia temporária do deployment
          cp k8s/app-deployment.yaml k8s/app-deployment-temp.yaml
          
          # Substituir a tag da imagem
          sed -i "s|image:.*tech-challenge:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" k8s/app-deployment-temp.yaml
          
          echo "✅ Deployment atualizado com nova imagem"
      
      # PostgreSQL deployment removed - using RDS instead
      # The application will connect to RDS PostgreSQL via DB_HOST secret
      
      - name: 🚀 Deploy Application
        run: |
          echo "🚀 Deploying application..."
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/app-deployment-temp.yaml
          kubectl apply -f k8s/app-service.yaml
          kubectl apply -f k8s/hpa.yaml
          
          echo "⏳ Aguardando aplicação ficar pronta..."
          kubectl wait --for=condition=ready pod -l app=tech-challenge -n tech-challenge --timeout=300s || true
          
          echo "✅ Aplicação deployada"
      
      - name: 🔍 Debug - Check Pod Status
        if: always()
        run: |
          echo "📊 Pod Status:"
          kubectl get pods -n tech-challenge -o wide
          
          echo ""
          echo "📋 Pod Events:"
          kubectl get events -n tech-challenge --sort-by='.lastTimestamp' | tail -20
          
          echo ""
          echo "📜 Application Logs (last 50 lines):"
          kubectl logs -l app=tech-challenge -n tech-challenge --tail=50 || echo "No logs available"
          
          echo ""
          echo "🔍 Pod Describe:"
          kubectl describe pods -l app=tech-challenge -n tech-challenge
      
      - name: 📊 Verify deployment
        run: |
          echo "📊 Status do deployment:"
          kubectl get all -n tech-challenge
          
          echo ""
          echo "🔍 Status dos pods:"
          kubectl get pods -n tech-challenge -o wide
          
          echo ""
          echo "🌐 Services:"
          kubectl get svc -n tech-challenge
          
          echo ""
          echo "📈 HPA Status:"
          kubectl get hpa -n tech-challenge
      
      - name: 🔗 Get LoadBalancer URL
        run: |
          echo "🔗 Obtendo URL do LoadBalancer..."
          sleep 30  # Aguardar LoadBalancer provisionar
          
          LOADBALANCER_URL=$(kubectl get svc tech-challenge-service -n tech-challenge -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          if [ -z "$LOADBALANCER_URL" ]; then
            echo "⚠️ LoadBalancer ainda não provisionado. Verifique após alguns minutos."
          else
            echo "✅ Aplicação disponível em: http://$LOADBALANCER_URL"
            echo "LOADBALANCER_URL=$LOADBALANCER_URL" >> $GITHUB_ENV
          fi
      
      - name: 🧪 Run smoke tests
        run: |
          echo "🧪 Executando smoke tests..."
          
          # Aguardar serviço estar disponível
          sleep 60
          
          # Testar health endpoint
          kubectl exec -n tech-challenge deployment/tech-challenge-app -- \
            wget -qO- http://localhost:8080/actuator/health || true
          
          echo "✅ Smoke tests concluídos"

  # ============================================================================
  # JOB 6: NOTIFICAÇÕES E ROLLBACK (SE NECESSÁRIO)
  # ============================================================================
  post-deployment:
    name: Post Deployment
    runs-on: ubuntu-latest
    needs: kubernetes-deploy
    if: always()
    
    steps:
      - name: 📊 Deployment Status
        run: |
          if [ "${{ needs.kubernetes-deploy.result }}" == "success" ]; then
            echo "✅ Deploy concluído com sucesso!"
          else
            echo "❌ Deploy falhou!"
            exit 1
          fi
      
      - name: 📧 Send notification (opcional)
        if: always()
        run: |
          echo "📧 Enviando notificação..."
          echo "Status: ${{ needs.kubernetes-deploy.result }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          # Aqui você pode integrar com Slack, Discord, Email, etc.

