name: CI/CD - Build, Test and Deploy

on:
  push:
    branches: [master, fase-3]
  workflow_dispatch:

env:
  DOCKER_IMAGE: vitorvieira12/tech-challenge-app
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: tech-challenge-cluster

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests with coverage
        run: mvn clean test jacoco:report

      - name: Check test coverage
        run: mvn jacoco:check || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  build:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"

  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fase-3'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Check EKS connection
        run: kubectl get nodes

      - name: Create namespace if not exists
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Apply New Relic secret
        run: |
          kubectl create secret generic newrelic-secret \
            --namespace=tech-challenge \
            --from-literal=NEW_RELIC_LICENSE_KEY=${{ secrets.NEW_RELIC_LICENSE_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply New Relic Infrastructure (DaemonSet)
        run: |
          kubectl apply -f k8s/newrelic-infrastructure.yaml

      - name: Set image tag
        id: image
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          IMAGE_TAG="${BRANCH_NAME}-${GITHUB_SHA::7}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/tech-challenge-app \
            app=${{ env.DOCKER_IMAGE }}:${{ steps.image.outputs.tag }} \
            -n tech-challenge

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tech-challenge-app -n tech-challenge --timeout=16m

      - name: Verify deployment
        run: |
          kubectl get pods -n tech-challenge -l app=tech-challenge
          kubectl get svc -n tech-challenge tech-challenge-app

      - name: Get application URL
        run: |
          echo "Application URL:"
          kubectl get svc tech-challenge-app -n tech-challenge -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'

  notify:
    name: Notify Deployment Status
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Success
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "✅ Deployment successful!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Deployment Failed
        if: ${{ needs.deploy.result == 'failure' }}
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above."
          exit 1
