name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

env:
  JAVA_VERSION: '21'

jobs:
  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🏷️ Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"
      
      - name: 📝 Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-config.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🎉 Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Tech Challenge v${{ steps.version.outputs.version }}
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## 📦 Installation
            
            ### Docker
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/tech-challenge:${{ steps.version.outputs.version }}
            ```
            
            ### Kubernetes
            ```bash
            kubectl set image deployment/tech-challenge-app \
              app=${{ secrets.DOCKER_USERNAME }}/tech-challenge:${{ steps.version.outputs.version }} \
              -n tech-challenge
            ```
            
            ## 📄 Full Changelog
            [View all changes](https://github.com/${{ github.repository }}/compare/v${{ steps.version.outputs.version }})
          draft: false
          prerelease: false

  # ============================================================================
  # BUILD RELEASE ARTIFACTS
  # ============================================================================
  build-artifacts:
    name: 🏗️ Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔨 Build
        run: mvn clean package -DskipTests
      
      - name: 📦 Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/Tech-Challenge-0.0.1-SNAPSHOT.jar
          asset_name: tech-challenge-${{ needs.create-release.outputs.version }}.jar
          asset_content_type: application/java-archive

  # ============================================================================
  # RELEASE DOCKER IMAGE
  # ============================================================================
  release-docker:
    name: 🐳 Release Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🐳 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tech-challenge:${{ needs.create-release.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/tech-challenge:latest
          platforms: linux/amd64,linux/arm64

