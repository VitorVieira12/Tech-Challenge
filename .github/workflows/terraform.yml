name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  # ============================================================================
  # TERRAFORM VALIDATION
  # ============================================================================
  terraform-validate:
    name: 🔍 Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [aws]  # azure, gcp quando implementados
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔍 Terraform Format Check
        working-directory: infra/${{ matrix.provider }}
        run: terraform fmt -check -recursive
      
      - name: 🔧 Terraform Init
        working-directory: infra/${{ matrix.provider }}
        run: terraform init -backend=false
      
      - name: ✅ Terraform Validate
        working-directory: infra/${{ matrix.provider }}
        run: terraform validate
      
      - name: 🔍 TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      
      - name: 🔍 Run TFLint
        working-directory: infra/${{ matrix.provider }}
        run: |
          tflint --init
          tflint

  # ============================================================================
  # TERRAFORM PLAN (AWS)
  # ============================================================================
  terraform-plan-aws:
    name: 📋 Terraform Plan (AWS)
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔧 Terraform Init
        working-directory: infra/aws
        run: terraform init
      
      - name: 📋 Terraform Plan
        working-directory: infra/aws
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt
      
      - name: 💬 Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/aws/plan.txt', 'utf8');
            const truncated = plan.length > 65000 ? plan.substring(0, 65000) + '\n\n...truncated' : plan;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan (AWS)\n\n\`\`\`terraform\n${truncated}\n\`\`\``
            });
      
      - name: 💾 Upload Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan-aws
          path: infra/aws/tfplan

  # ============================================================================
  # TERRAFORM APPLY (AWS)
  # ============================================================================
  terraform-apply-aws:
    name: 🚀 Terraform Apply (AWS)
    runs-on: ubuntu-latest
    needs: terraform-plan-aws
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event.inputs.action == 'apply'
    environment:
      name: infrastructure-aws
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 💾 Download Plan
        uses: actions/download-artifact@v3
        with:
          name: terraform-plan-aws
          path: infra/aws/
      
      - name: 🔧 Terraform Init
        working-directory: infra/aws
        run: terraform init
      
      - name: 🚀 Terraform Apply
        working-directory: infra/aws
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan
      
      - name: 📤 Output kubeconfig
        working-directory: infra/aws
        run: |
          terraform output -raw kubeconfig > kubeconfig
          echo "KUBECONFIG_B64=$(cat kubeconfig | base64 -w 0)" >> $GITHUB_ENV
      
      - name: 💾 Save kubeconfig to Secrets
        uses: actions/github-script@v7
        with:
          script: |
            // Salvar kubeconfig como secret (requer permissões admin)
            console.log('Kubeconfig gerado e pode ser salvo manualmente em Secrets')

  # ============================================================================
  # TERRAFORM DESTROY
  # ============================================================================
  terraform-destroy-aws:
    name: 🗑️ Terraform Destroy (AWS)
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: infrastructure-aws-destroy
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔧 Terraform Init
        working-directory: infra/aws
        run: terraform init
      
      - name: 🗑️ Terraform Destroy
        working-directory: infra/aws
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform destroy -auto-approve


