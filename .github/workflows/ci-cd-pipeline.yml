name: CI/CD Pipeline - Tech Challenge

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx3072m
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tech-challenge
  REGISTRY: docker.io

jobs:
  # ============================================================================
  # JOB 1: BUILD E TESTES
  # ============================================================================
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para SonarQube
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔍 Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: 🔨 Build with Maven
        run: |
          echo "🔨 Compilando o projeto..."
          mvn clean compile -DskipTests
      
      - name: 🧪 Run Unit Tests
        run: |
          echo "🧪 Executando testes unitários..."
          mvn test -Dtest=!*IntegrationTest
      
      - name: 📊 Generate Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests Report
          path: target/surefire-reports/*.xml
          reporter: java-junit
      
      - name: 📦 Package Application
        run: |
          echo "📦 Empacotando aplicação..."
          mvn package -DskipTests
      
      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
      
      - name: 💾 Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ============================================================================
  # JOB 2: ANÁLISE DE SEGURANÇA E QUALIDADE
  # ============================================================================
  security-scan:
    name: 🔐 Security & Quality Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔍 OWASP Dependency Check
        run: |
          echo "🔍 Verificando vulnerabilidades em dependências..."
          mvn org.owasp:dependency-check-maven:check || true
      
      - name: 📊 SonarQube Scan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "📊 Executando análise SonarQube..."
            mvn sonar:sonar \
              -Dsonar.projectKey=tech-challenge \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN
          else
            echo "⚠️ SonarQube token não configurado, pulando análise"
          fi

  # ============================================================================
  # JOB 3: BUILD E PUSH DOCKER IMAGE
  # ============================================================================
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push'
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.docker-build.outputs.digest }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 💾 Download JAR artifact
        uses: actions/download-artifact@v3
        with:
          name: app-jar
          path: target/
      
      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏷️ Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: 🐳 Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: 🔍 Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: 📤 Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # JOB 4: DEPLOY NO KUBERNETES (STAGING)
  # ============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.tech-challenge.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: 🔐 Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      
      - name: 🎯 Update Kubernetes manifests
        run: |
          # Atualizar imagem nos manifests
          IMAGE_TAG="${{ needs.docker-build-push.outputs.image-tag }}"
          sed -i "s|image: tech-challenge:.*|image: ${IMAGE_TAG}|g" k8s/app-deployment.yaml
          
          echo "📝 Manifests atualizados com imagem: ${IMAGE_TAG}"
      
      - name: 🚀 Deploy to Kubernetes
        run: |
          echo "🚀 Fazendo deploy no cluster staging..."
          
          # Aplicar ConfigMaps e Secrets primeiro
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          
          # Aplicar recursos de banco de dados
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          
          # Aplicar aplicação
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          kubectl apply -f k8s/hpa.yaml
          
          echo "✅ Deploy concluído!"
      
      - name: ⏳ Wait for rollout
        run: |
          echo "⏳ Aguardando rollout completar..."
          kubectl rollout status deployment/tech-challenge-app -n tech-challenge --timeout=5m
      
      - name: 🔍 Verify deployment
        run: |
          echo "🔍 Verificando deployment..."
          kubectl get pods -n tech-challenge
          kubectl get svc -n tech-challenge
      
      - name: 🧪 Run smoke tests
        run: |
          echo "🧪 Executando smoke tests..."
          # Aguardar service estar pronto
          sleep 30
          
          # Obter URL do service
          SERVICE_URL=$(kubectl get svc tech-challenge-service -n tech-challenge -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          if [ -z "$SERVICE_URL" ]; then
            SERVICE_URL=$(kubectl get svc tech-challenge-service -n tech-challenge -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          fi
          
          if [ -n "$SERVICE_URL" ]; then
            # Testar health endpoint
            curl -f http://${SERVICE_URL}/actuator/health || exit 1
            echo "✅ Smoke tests passaram!"
          else
            echo "⚠️ Service URL não disponível ainda"
          fi

  # ============================================================================
  # JOB 5: DEPLOY NO KUBERNETES (PRODUCTION)
  # ============================================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://tech-challenge.com
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: 🔐 Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      
      - name: 🎯 Update Kubernetes manifests
        run: |
          IMAGE_TAG="${{ needs.docker-build-push.outputs.image-tag }}"
          sed -i "s|image: tech-challenge:.*|image: ${IMAGE_TAG}|g" k8s/app-deployment.yaml
          
          # Configurações específicas de produção
          sed -i 's/replicas: 2/replicas: 3/g' k8s/app-deployment.yaml
      
      - name: 🚀 Deploy to Kubernetes
        run: |
          echo "🚀 Fazendo deploy no cluster production..."
          kubectl apply -f k8s/
          echo "✅ Deploy concluído!"
      
      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/tech-challenge-app -n tech-challenge --timeout=10m
      
      - name: 🔍 Verify deployment
        run: |
          kubectl get pods -n tech-challenge
          kubectl get svc -n tech-challenge
          kubectl get hpa -n tech-challenge
      
      - name: 📢 Create deployment annotation
        run: |
          kubectl annotate deployment tech-challenge-app -n tech-challenge \
            kubernetes.io/change-cause="Deployed from GitHub Actions - SHA: ${{ github.sha }}"

  # ============================================================================
  # JOB 6: NOTIFICAÇÕES
  # ============================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: 📢 Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            🚀 *Deploy Tech Challenge*
            
            *Branch:* ${{ github.ref_name }}
            *Commit:* ${{ github.sha }}
            *Author:* ${{ github.actor }}
            *Status:* ${{ job.status }}
            
            *Staging:* ${{ needs.deploy-staging.result }}
            *Production:* ${{ needs.deploy-production.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}


