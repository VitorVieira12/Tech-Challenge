name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: '21'

jobs:
  # ============================================================================
  # VALIDAÇÃO DE CÓDIGO
  # ============================================================================
  validate:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔍 Check code style
        run: |
          echo "🔍 Verificando estilo de código..."
          mvn checkstyle:check || true
      
      - name: 🔨 Build
        run: |
          echo "🔨 Compilando projeto..."
          mvn clean compile -DskipTests
      
      - name: 🧪 Run tests
        run: |
          echo "🧪 Executando testes..."
          mvn test
      
      - name: 📊 Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
      
      - name: 📈 Coverage Report
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: pr-tests
      
      - name: 💬 Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('target/site/jacoco/index.html', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results\n\nBuild and tests completed! Check the details above.`
            });

  # ============================================================================
  # ANÁLISE DE SEGURANÇA
  # ============================================================================
  security-check:
    name: 🔐 Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: 🔍 Dependency Check
        run: |
          echo "🔍 Verificando dependências..."
          mvn org.owasp:dependency-check-maven:check
      
      - name: 📤 Upload security report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # ============================================================================
  # VERIFICAÇÃO DE DOCKER
  # ============================================================================
  docker-check:
    name: 🐳 Docker Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      
      - name: 🐳 Build Docker image (test)
        run: |
          echo "🐳 Testando build da imagem Docker..."
          docker build -t tech-challenge:pr-test .
      
      - name: 🔍 Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tech-challenge:pr-test'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'


