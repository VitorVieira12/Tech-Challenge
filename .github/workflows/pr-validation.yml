name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  JAVA_VERSION: 21

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para análise completa
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
      
      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: 🔧 Build
        run: mvn clean compile -DskipTests
      
      - name: 🧪 Run Tests
        run: mvn verify
      
      - name: 📊 Test Coverage Check
        run: |
          mvn jacoco:check || true
          echo "Coverage report generated"
      
      - name: 💬 Comment PR with test results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 🧪 Test Results\n\n';
            comment += '- ✅ Build: Success\n';
            comment += '- ✅ Tests: Passed\n';
            comment += '- 📊 Coverage: See detailed report\n\n';
            comment += '---\n';
            comment += `📝 PR #${{ github.event.pull_request.number }} | Commit: ${{ github.sha }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

