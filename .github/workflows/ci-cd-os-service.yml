name: OS Service CI/CD

on:
  push:
    branches: [ fase-4, main ]
  pull_request:
    branches: [ fase-4, main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/os-service
  EKS_CLUSTER: tech-challenge-cluster
  AWS_REGION: us-east-1
  K8S_NAMESPACE: os-service

jobs:
  # ─── 1. Build & Test ────────────────────────────────────────────────────────
  build-and-test:
    name: Build, Test & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and check coverage
        run: mvn verify -B -Dsurefire.useFile=false -Dfailsafe.useFile=false

      - name: SonarQube Analysis
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=VitorVieira12_Tech-Challenge \
            -Dsonar.organization=vitorvieira12 \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -B || echo "SonarQube not configured, skipping"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          if-no-files-found: ignore

  # ─── 2. Build Docker Image ──────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/fase-4' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests -B

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ─── 3. Deploy to EKS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/fase-4' || github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply K8s manifests (OS Service + shared RabbitMQ)
        run: kubectl apply -f k8s/os-service.yml -f k8s/rabbitmq.yml

      - name: Update deployment image
        run: |
          kubectl set image deployment/os-service \
            os-service=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/os-service -n ${{ env.K8S_NAMESPACE }} --timeout=5m
